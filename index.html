<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TAg Sports — Built to Break Limits</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://assets.adobedtm.com/08c6c96e8270/bbd56bb41370/launch-eaf9e98e767f-development.min.js" async></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fafafa; color: #111; }
    button { font-family: inherit; }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    @keyframes slideIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp  { from { opacity:0; transform:translateY(32px); } to { opacity:1; transform:translateY(0); } }
    .fade-up-1 { animation: fadeUp 0.7s ease 0.1s both; }
    .fade-up-2 { animation: fadeUp 0.7s ease 0.3s both; }
    .fade-up-3 { animation: fadeUp 0.7s ease 0.5s both; }
    button:hover { opacity: 0.88; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const PRODUCTS = [
      { id:1, name:"TAg Apex Pro",    category:"Running",    price:189, originalPrice:229, tag:"Best Seller", colors:["#1a1a2e","#e94560","#fff"],    sizes:[7,8,9,10,11,12], rating:4.9, reviews:2341, desc:"Ultra-lightweight carbon-fiber plated racer. Sub-4 marathon certified.", img:"apex"  },
      { id:2, name:"TAg Drift X",     category:"Lifestyle",  price:149, originalPrice:null,tag:"New Drop",    colors:["#f5f5f5","#2d2d2d","#c8a96e"],sizes:[7,8,9,10,11,12], rating:4.7, reviews:891,  desc:"Street-ready silhouette with memory foam insole. All-day comfort.",    img:"drift"  },
      { id:3, name:"TAg Storm Elite", category:"Basketball", price:219, originalPrice:259, tag:"Sale",        colors:["#0d0d0d","#f59e0b","#1e40af"],sizes:[8,9,10,11,12],   rating:4.8, reviews:1203, desc:"High-ankle lockdown support with reactive cushioning for the court.",   img:"storm"  },
      { id:4, name:"TAg Terra GTX",   category:"Trail",      price:169, originalPrice:null,tag:null,          colors:["#78350f","#374151","#6b7280"],sizes:[7,8,9,10,11,12], rating:4.6, reviews:654,  desc:"Gore-Tex waterproof upper with aggressive lug outsole for rugged terrain.",img:"terra"},
      { id:5, name:"TAg Flux Speed",  category:"Running",    price:139, originalPrice:159, tag:"Sale",        colors:["#e94560","#fff","#1a1a2e"],   sizes:[7,8,9,10,11,12], rating:4.5, reviews:432,  desc:"Responsive foam midsole with reflective overlays for night runs.",    img:"flux"   },
      { id:6, name:"TAg Court Zero",  category:"Tennis",     price:159, originalPrice:null,tag:null,          colors:["#fff","#10b981","#1a1a2e"],   sizes:[7,8,9,10,11,12], rating:4.7, reviews:789,  desc:"Herringbone outsole pattern for clay and hard court dominance.",      img:"court"  },
    ];

    const SHOE_COLORS = {
      apex: {primary:"#e94560",secondary:"#1a1a2e",accent:"#fff"},
      drift:{primary:"#2d2d2d",secondary:"#f5f5f5",accent:"#c8a96e"},
      storm:{primary:"#f59e0b",secondary:"#0d0d0d",accent:"#1e40af"},
      terra:{primary:"#78350f",secondary:"#374151",accent:"#6b7280"},
      flux: {primary:"#1a1a2e",secondary:"#e94560",accent:"#fff"},
      court:{primary:"#10b981",secondary:"#fff",   accent:"#1a1a2e"},
    };

    function ShoeSVG({type,size=160}){
      const c=SHOE_COLORS[type]||SHOE_COLORS.apex;
      return(
        <svg width={size} height={size*0.6} viewBox="0 0 200 110" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="100" cy="95" rx="90" ry="10" fill="rgba(0,0,0,0.12)"/>
          <path d="M20 75 Q30 40 60 35 Q85 30 110 38 L160 45 Q185 48 182 62 Q180 72 160 75 Z" fill={c.secondary}/>
          <path d="M20 75 L160 75 Q182 75 182 62 Q182 55 175 53 L160 75 Z" fill={c.primary} opacity="0.85"/>
          <path d="M60 35 Q75 20 90 22 Q110 20 130 30 L160 45 Q175 47 180 55 L130 50 Q100 42 60 35 Z" fill={c.primary}/>
          <path d="M88 22 L92 37 M102 20 L105 36 M116 22 L118 37" stroke={c.accent} strokeWidth="1.5" strokeLinecap="round" opacity="0.7"/>
          <ellipse cx="155" cy="60" rx="18" ry="13" fill={c.accent} opacity="0.15"/>
          <circle cx="155" cy="60" r="6" fill={c.accent} opacity="0.5"/>
          <path d="M22 75 Q20 82 30 86 L155 86 Q172 86 175 78 L160 75 Z" fill={c.secondary} opacity="0.7"/>
          <path d="M22 75 Q20 82 42 86 L50 86 L52 75 Z" fill={c.primary} opacity="0.9"/>
          <path d="M70 75 L72 80 M90 75 L92 80 M110 75 L112 80 M130 75 L132 80" stroke={c.accent} strokeWidth="1" opacity="0.4"/>
        </svg>
      );
    }

    function Stars({rating}){
      return(
        <span style={{display:"flex",gap:2,alignItems:"center"}}>
          {[1,2,3,4,5].map(s=>(
            <svg key={s} width="12" height="12" viewBox="0 0 12 12">
              <polygon points="6,1 7.5,4.5 11,4.8 8.5,7 9.3,10.5 6,8.7 2.7,10.5 3.5,7 1,4.8 4.5,4.5"
                fill={s<=Math.round(rating)?"#e94560":"#e5e7eb"}/>
            </svg>
          ))}
          <span style={{fontSize:11,color:"#9ca3af",marginLeft:2}}>{rating}</span>
        </span>
      );
    }

    function ProductCard({product,onView,onAddToCart}){
      const [hov,setHov]=useState(false);
      const [selColor,setSelColor]=useState(0);
      return(
        <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
          style={{background:"#fff",borderRadius:20,overflow:"hidden",position:"relative",
            transition:"transform 0.3s ease,box-shadow 0.3s ease",
            transform:hov?"translateY(-8px)":"translateY(0)",
            boxShadow:hov?"0 24px 60px rgba(0,0,0,0.14)":"0 4px 20px rgba(0,0,0,0.06)"}}>
          {product.tag&&(
            <div style={{position:"absolute",top:16,left:16,zIndex:2,
              background:product.tag==="Sale"?"#e94560":product.tag==="New Drop"?"#10b981":"#1a1a2e",
              color:"#fff",fontSize:10,fontWeight:700,letterSpacing:"0.08em",
              padding:"4px 10px",borderRadius:20,textTransform:"uppercase"}}>{product.tag}</div>
          )}
          <div style={{background:"linear-gradient(135deg,#f8f9fa 0%,#f0f0f0 100%)",
            height:180,display:"flex",justifyContent:"center",alignItems:"center",
            padding:"32px 24px 16px",overflow:"hidden"}}>
            <div style={{transition:"transform 0.4s ease",
              transform:hov?"scale(1.08) rotate(-3deg)":"scale(1) rotate(0deg)"}}>
              <ShoeSVG type={product.img} size={180}/>
            </div>
          </div>
          <div style={{padding:"20px 20px 24px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
              <div>
                <p style={{fontSize:11,color:"#e94560",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",margin:"0 0 4px"}}>{product.category}</p>
                <h3 style={{margin:0,fontSize:16,fontWeight:700,color:"#111",fontFamily:"'Bebas Neue',sans-serif",letterSpacing:"0.04em"}}>{product.name}</h3>
              </div>
              <div style={{textAlign:"right"}}>
                <p style={{margin:0,fontSize:18,fontWeight:800,color:"#111"}}>${product.price}</p>
                {product.originalPrice&&<p style={{margin:0,fontSize:12,color:"#9ca3af",textDecoration:"line-through"}}>${product.originalPrice}</p>}
              </div>
            </div>
            <p style={{fontSize:12,color:"#6b7280",lineHeight:1.5,margin:"8px 0 12px",minHeight:36}}>{product.desc}</p>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <Stars rating={product.rating}/>
              <span style={{fontSize:11,color:"#9ca3af"}}>{product.reviews.toLocaleString()} reviews</span>
            </div>
            <div style={{display:"flex",gap:6,marginBottom:14}}>
              {product.colors.map((col,i)=>(
                <button key={i} onClick={e=>{e.stopPropagation();setSelColor(i);}}
                  style={{width:20,height:20,borderRadius:"50%",background:col,
                    border:selColor===i?"2px solid #e94560":"2px solid #e5e7eb",
                    cursor:"pointer",outline:"none",
                    boxShadow:col==="#fff"?"inset 0 0 0 1px #d1d5db":"none"}}/>
              ))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>onView(product)} style={{flex:1,padding:"10px 0",borderRadius:12,
                border:"1.5px solid #1a1a2e",background:"transparent",color:"#1a1a2e",
                fontWeight:700,fontSize:12,letterSpacing:"0.06em",textTransform:"uppercase",cursor:"pointer"}}>View</button>
              <button onClick={()=>onAddToCart(product)} style={{flex:2,padding:"10px 0",borderRadius:12,
                border:"none",background:"#1a1a2e",color:"#fff",
                fontWeight:700,fontSize:12,letterSpacing:"0.06em",textTransform:"uppercase",cursor:"pointer"}}>Add to Cart</button>
            </div>
          </div>
        </div>
      );
    }

    function ProductModal({product,onClose,onAddToCart}){
      const [selSize,setSelSize]=useState(null);
      const [selColor,setSelColor]=useState(0);
      const [qty,setQty]=useState(1);
      if(!product)return null;
      return(
        <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:1000,
          display:"flex",alignItems:"center",justifyContent:"center",padding:24,backdropFilter:"blur(4px)"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:28,width:"100%",maxWidth:820,
            display:"grid",gridTemplateColumns:"1fr 1fr",overflow:"hidden",maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{background:"linear-gradient(135deg,#f0f0f0 0%,#e8e8e8 100%)",
              display:"flex",alignItems:"center",justifyContent:"center",padding:48,minHeight:400}}>
              <ShoeSVG type={product.img} size={260}/>
            </div>
            <div style={{padding:"40px 36px",display:"flex",flexDirection:"column",gap:20}}>
              <button onClick={onClose} style={{alignSelf:"flex-end",background:"#f3f4f6",border:"none",
                borderRadius:"50%",width:36,height:36,cursor:"pointer",fontSize:18,color:"#374151",
                display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
              <div>
                <p style={{margin:"0 0 6px",fontSize:11,color:"#e94560",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase"}}>{product.category}</p>
                <h2 style={{margin:0,fontSize:28,fontWeight:900,color:"#111",fontFamily:"'Bebas Neue',sans-serif",letterSpacing:"0.04em"}}>{product.name}</h2>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:16}}>
                <span style={{fontSize:28,fontWeight:900,color:"#1a1a2e"}}>${product.price}</span>
                {product.originalPrice&&<span style={{fontSize:16,color:"#9ca3af",textDecoration:"line-through"}}>${product.originalPrice}</span>}
              </div>
              <Stars rating={product.rating}/>
              <p style={{fontSize:14,color:"#4b5563",lineHeight:1.7}}>{product.desc}</p>
              <div>
                <p style={{fontSize:12,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"#374151",margin:"0 0 10px"}}>Colour</p>
                <div style={{display:"flex",gap:8}}>
                  {product.colors.map((col,i)=>(
                    <button key={i} onClick={()=>setSelColor(i)} style={{width:28,height:28,borderRadius:"50%",background:col,
                      border:selColor===i?"2px solid #e94560":"2px solid #e5e7eb",cursor:"pointer",outline:"none",
                      boxShadow:col==="#fff"?"inset 0 0 0 1px #d1d5db":"none"}}/>
                  ))}
                </div>
              </div>
              <div>
                <p style={{fontSize:12,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"#374151",margin:"0 0 10px"}}>Size (US)</p>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {product.sizes.map(s=>(
                    <button key={s} onClick={()=>setSelSize(s)} style={{width:44,height:44,borderRadius:10,
                      border:selSize===s?"2px solid #e94560":"1.5px solid #e5e7eb",
                      background:selSize===s?"#fff0f3":"#fff",
                      color:selSize===s?"#e94560":"#374151",
                      fontWeight:700,fontSize:13,cursor:"pointer"}}>{s}</button>
                  ))}
                </div>
              </div>
              <div style={{display:"flex",gap:12,alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",border:"1.5px solid #e5e7eb",borderRadius:12,overflow:"hidden"}}>
                  <button onClick={()=>setQty(Math.max(1,qty-1))} style={{width:40,height:44,border:"none",background:"transparent",fontSize:18,cursor:"pointer",color:"#374151"}}>−</button>
                  <span style={{width:36,textAlign:"center",fontWeight:700}}>{qty}</span>
                  <button onClick={()=>setQty(qty+1)} style={{width:40,height:44,border:"none",background:"transparent",fontSize:18,cursor:"pointer",color:"#374151"}}>+</button>
                </div>
                <button onClick={()=>{onAddToCart(product,qty);onClose();}} style={{flex:1,padding:"14px 0",borderRadius:14,
                  border:"none",background:"#e94560",color:"#fff",fontWeight:800,fontSize:14,
                  letterSpacing:"0.08em",textTransform:"uppercase",cursor:"pointer"}}>Add to Cart — ${product.price*qty}</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function CartDrawer({cart,onClose,onUpdateQty,onRemove}){
      const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
      return(
        <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:1000,display:"flex",justifyContent:"flex-end"}}>
          <div onClick={e=>e.stopPropagation()} style={{width:420,background:"#fff",height:"100%",overflowY:"auto",display:"flex",flexDirection:"column"}}>
            <div style={{padding:"28px 28px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <h2 style={{margin:0,fontSize:22,fontWeight:900,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:"0.06em"}}>YOUR CART ({cart.length})</h2>
              <button onClick={onClose} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:"#374151"}}>✕</button>
            </div>
            <div style={{flex:1,padding:28,display:"flex",flexDirection:"column",gap:20}}>
              {cart.length===0?(
                <div style={{textAlign:"center",padding:60,color:"#9ca3af"}}>
                  <div style={{fontSize:48,marginBottom:16}}>👟</div>
                  <p style={{fontWeight:600}}>Your cart is empty</p>
                </div>
              ):cart.map(item=>(
                <div key={item.id} style={{display:"flex",gap:16,alignItems:"center",background:"#f9fafb",borderRadius:16,padding:16}}>
                  <div style={{background:"#ebebeb",borderRadius:12,padding:8,flexShrink:0}}>
                    <ShoeSVG type={item.img} size={70}/>
                  </div>
                  <div style={{flex:1}}>
                    <p style={{margin:"0 0 2px",fontSize:13,fontWeight:700,color:"#111"}}>{item.name}</p>
                    <p style={{margin:"0 0 8px",fontSize:12,color:"#9ca3af"}}>Size {item.size||"–"}</p>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div style={{display:"flex",alignItems:"center",border:"1px solid #e5e7eb",borderRadius:8,overflow:"hidden"}}>
                        <button onClick={()=>onUpdateQty(item.id,item.qty-1)} style={{width:28,height:28,border:"none",background:"transparent",cursor:"pointer",fontSize:14}}>−</button>
                        <span style={{width:24,textAlign:"center",fontSize:13,fontWeight:700}}>{item.qty}</span>
                        <button onClick={()=>onUpdateQty(item.id,item.qty+1)} style={{width:28,height:28,border:"none",background:"transparent",cursor:"pointer",fontSize:14}}>+</button>
                      </div>
                      <span style={{fontWeight:800,color:"#1a1a2e"}}>${item.price*item.qty}</span>
                    </div>
                  </div>
                  <button onClick={()=>onRemove(item.id)} style={{background:"none",border:"none",color:"#e94560",cursor:"pointer",fontSize:20,padding:4}}>✕</button>
                </div>
              ))}
            </div>
            {cart.length>0&&(
              <div style={{padding:28,borderTop:"1px solid #f3f4f6"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <span style={{color:"#6b7280",fontSize:14}}>Subtotal</span>
                  <span style={{fontWeight:700}}>${total}</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
                  <span style={{color:"#6b7280",fontSize:14}}>Shipping</span>
                  <span style={{color:"#10b981",fontWeight:600}}>Free</span>
                </div>
                <button style={{width:"100%",padding:"16px 0",borderRadius:16,border:"none",
                  background:"#1a1a2e",color:"#fff",fontWeight:900,fontSize:15,
                  letterSpacing:"0.08em",textTransform:"uppercase",cursor:"pointer"}}>Checkout — ${total}</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    function App(){
      const [activeCategory,setActiveCategory]=useState("All");
      const [cart,setCart]=useState([]);
      const [selectedProduct,setSelectedProduct]=useState(null);
      const [cartOpen,setCartOpen]=useState(false);
      const [toast,setToast]=useState(null);

      const categories=["All","Running","Basketball","Lifestyle","Trail","Tennis"];
      const filtered=activeCategory==="All"?PRODUCTS:PRODUCTS.filter(p=>p.category===activeCategory);

      function addToCart(product,qty=1){
        setCart(prev=>{
          const ex=prev.find(i=>i.id===product.id);
          return ex?prev.map(i=>i.id===product.id?{...i,qty:i.qty+qty}:i):[...prev,{...product,qty}];
        });
        setToast(product.name+" added to cart!");
        setTimeout(()=>setToast(null),2800);
      }
      function updateQty(id,qty){ if(qty<1){removeItem(id);return;} setCart(prev=>prev.map(i=>i.id===id?{...i,qty}:i)); }
      function removeItem(id){ setCart(prev=>prev.filter(i=>i.id!==id)); }
      const cartCount=cart.reduce((s,i)=>s+i.qty,0);

      return(
        <div>
          {/* NAVBAR */}
          <nav style={{position:"sticky",top:0,zIndex:100,background:"rgba(255,255,255,0.96)",
            backdropFilter:"blur(12px)",borderBottom:"1px solid #f0f0f0",
            display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 48px",height:72}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:36,height:36,background:"#1a1a2e",borderRadius:8,
                display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span style={{color:"#e94560",fontWeight:900,fontSize:16,fontFamily:"'Bebas Neue',sans-serif"}}>T</span>
              </div>
              <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,letterSpacing:"0.1em",color:"#1a1a2e"}}>TAg</span>
            </div>
            <div style={{display:"flex",gap:32}}>
              {["Shop","New Drops","Sale","About"].map(item=>(
                <button key={item} style={{background:"none",border:"none",fontSize:13,fontWeight:600,
                  letterSpacing:"0.06em",color:"#374151",cursor:"pointer",textTransform:"uppercase"}}>{item}</button>
              ))}
            </div>
            <div style={{display:"flex",gap:20,alignItems:"center"}}>
              <button style={{background:"none",border:"none",cursor:"pointer",color:"#374151",fontSize:20}}>🔍</button>
              <button onClick={()=>setCartOpen(true)} style={{position:"relative",background:"#1a1a2e",border:"none",
                borderRadius:12,padding:"8px 18px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,
                color:"#fff",fontWeight:700,fontSize:13}}>
                🛒 Cart
                {cartCount>0&&(
                  <span style={{position:"absolute",top:-8,right:-8,background:"#e94560",color:"#fff",
                    borderRadius:"50%",width:20,height:20,fontSize:11,fontWeight:800,
                    display:"flex",alignItems:"center",justifyContent:"center"}}>{cartCount}</span>
                )}
              </button>
            </div>
          </nav>

          {/* HERO */}
          <section style={{background:"#1a1a2e",color:"#fff",overflow:"hidden",position:"relative",
            padding:"80px 48px",minHeight:520,display:"flex",alignItems:"center"}}>
            <div style={{position:"absolute",inset:0,overflow:"hidden",opacity:0.06}}>
              {Array.from({length:8}).map((_,i)=>(
                <div key={i} style={{position:"absolute",borderRadius:"50%",border:"2px solid #fff",
                  width:300+i*120,height:300+i*120,top:"50%",left:"50%",transform:"translate(-50%,-50%)"}}/>
              ))}
            </div>
            <div className="fade-up-1" style={{position:"relative",zIndex:2,maxWidth:640}}>
              <div style={{display:"inline-block",background:"#e94560",color:"#fff",fontSize:11,
                fontWeight:800,letterSpacing:"0.14em",textTransform:"uppercase",
                padding:"6px 16px",borderRadius:20,marginBottom:24}}>New Season · Spring 2026</div>
              <h1 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(56px,8vw,96px)",
                lineHeight:0.95,letterSpacing:"0.04em",margin:"0 0 20px"}}>
                BUILT TO<br/><span style={{color:"#e94560"}}>BREAK</span><br/>LIMITS.
              </h1>
              <p style={{fontSize:17,color:"rgba(255,255,255,0.65)",lineHeight:1.7,maxWidth:440,marginBottom:36}}>
                Performance footwear engineered for athletes who refuse to settle. Every step. Every surface. Every podium.
              </p>
              <div style={{display:"flex",gap:16}}>
                <button style={{background:"#e94560",color:"#fff",border:"none",padding:"16px 36px",borderRadius:14,
                  fontWeight:800,fontSize:14,letterSpacing:"0.08em",textTransform:"uppercase",cursor:"pointer"}}>Shop Now →</button>
                <button style={{background:"transparent",color:"#fff",border:"1.5px solid rgba(255,255,255,0.3)",
                  padding:"16px 32px",borderRadius:14,fontWeight:700,fontSize:14,
                  letterSpacing:"0.08em",textTransform:"uppercase",cursor:"pointer"}}>View Lookbook</button>
              </div>
            </div>
            <div className="fade-up-2" style={{position:"absolute",right:0,bottom:0,top:0,width:"45%",
              display:"flex",alignItems:"center",justifyContent:"center"}}>
              <ShoeSVG type="apex" size={360}/>
            </div>
            <div className="fade-up-3" style={{position:"absolute",bottom:32,left:48,display:"flex",gap:40}}>
              {[["50K+","Athletes"],["12","Technologies"],["4.9★","Rating"]].map(([val,label])=>(
                <div key={label}>
                  <p style={{margin:0,fontSize:22,fontWeight:900,fontFamily:"'Bebas Neue',sans-serif",color:"#e94560"}}>{val}</p>
                  <p style={{margin:0,fontSize:11,color:"rgba(255,255,255,0.5)",textTransform:"uppercase",letterSpacing:"0.1em"}}>{label}</p>
                </div>
              ))}
            </div>
          </section>

          {/* MARQUEE */}
          <div style={{background:"#e94560",padding:"12px 0",overflow:"hidden"}}>
            <div style={{display:"flex",gap:64,animation:"marquee 20s linear infinite",whiteSpace:"nowrap"}}>
              {Array.from({length:4}).flatMap(()=>["FREE SHIPPING OVER $100","30-DAY RETURNS","NEW SPRING COLLECTION","MEMBERS GET 20% OFF"]).map((t,i)=>(
                <span key={i} style={{fontSize:11,fontWeight:800,letterSpacing:"0.14em",color:"#fff",textTransform:"uppercase",paddingLeft:64}}>✦ {t}</span>
              ))}
            </div>
          </div>

          {/* SHOP */}
          <section style={{padding:"60px 48px 32px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:32,flexWrap:"wrap",gap:16}}>
              <div>
                <p style={{margin:"0 0 8px",fontSize:11,color:"#e94560",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase"}}>The Collection</p>
                <h2 style={{margin:0,fontSize:"clamp(28px,4vw,40px)",fontWeight:900,color:"#1a1a2e",fontFamily:"'Bebas Neue',sans-serif",letterSpacing:"0.04em"}}>SHOP BY SPORT</h2>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {categories.map(cat=>(
                  <button key={cat} onClick={()=>setActiveCategory(cat)} style={{padding:"8px 20px",borderRadius:20,
                    border:activeCategory===cat?"none":"1.5px solid #e5e7eb",
                    background:activeCategory===cat?"#1a1a2e":"transparent",
                    color:activeCategory===cat?"#fff":"#374151",
                    fontWeight:700,fontSize:12,letterSpacing:"0.06em",textTransform:"uppercase",cursor:"pointer",transition:"all 0.2s"}}>{cat}</button>
                ))}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:24}}>
              {filtered.map(p=>(
                <ProductCard key={p.id} product={p} onView={setSelectedProduct} onAddToCart={addToCart}/>
              ))}
            </div>
          </section>

          {/* TECH */}
          <section style={{padding:"60px 48px",background:"#fff",margin:"32px 0"}}>
            <div style={{textAlign:"center",marginBottom:40}}>
              <p style={{fontSize:11,color:"#e94560",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",margin:"0 0 8px"}}>Innovation</p>
              <h2 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,color:"#1a1a2e",letterSpacing:"0.04em"}}>THE TECHNOLOGY INSIDE</h2>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:24}}>
              {[{icon:"⚡",title:"ReactFoam™",desc:"Energy return technology that propels every stride forward."},
                {icon:"🛡️",title:"FlexGuard™",desc:"Adaptive support system that moves with your natural gait."},
                {icon:"🌿",title:"EcoWeave™",desc:"40% recycled materials without sacrificing performance."},
                {icon:"🔬",title:"ProFit™",desc:"3D-scanned lasts engineered for the perfect anatomical fit."}
              ].map(f=>(
                <div key={f.title} style={{textAlign:"center",padding:"28px 20px",borderRadius:20,border:"1px solid #f3f4f6"}}>
                  <div style={{fontSize:36,marginBottom:16}}>{f.icon}</div>
                  <h3 style={{margin:"0 0 8px",fontSize:16,fontWeight:800,color:"#1a1a2e"}}>{f.title}</h3>
                  <p style={{fontSize:13,color:"#6b7280",lineHeight:1.6,margin:0}}>{f.desc}</p>
                </div>
              ))}
            </div>
          </section>

          {/* SALE BANNER */}
          <section style={{margin:"0 48px 48px",borderRadius:28,overflow:"hidden",background:"#1a1a2e",
            padding:"60px 60px",display:"flex",justifyContent:"space-between",alignItems:"center",
            position:"relative",flexWrap:"wrap",gap:32}}>
            <div style={{position:"absolute",right:60,top:"50%",transform:"translateY(-50%)",opacity:0.12}}>
              <ShoeSVG type="storm" size={320}/>
            </div>
            <div style={{position:"relative",zIndex:2}}>
              <p style={{margin:"0 0 8px",fontSize:11,color:"#e94560",fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase"}}>Limited Time</p>
              <h2 style={{margin:"0 0 12px",fontFamily:"'Bebas Neue',sans-serif",fontSize:52,color:"#fff",letterSpacing:"0.04em",lineHeight:1}}>
                SEASON SALE<br/><span style={{color:"#e94560"}}>UP TO 40% OFF</span>
              </h2>
              <p style={{fontSize:14,color:"rgba(255,255,255,0.6)",marginBottom:28,maxWidth:380}}>
                Don't miss out on last season's finest. Professional-grade performance at unbeatable prices.
              </p>
              <button style={{background:"#e94560",color:"#fff",border:"none",padding:"14px 32px",borderRadius:12,
                fontWeight:800,fontSize:13,letterSpacing:"0.08em",textTransform:"uppercase",cursor:"pointer"}}>Shop the Sale →</button>
            </div>
            <div style={{display:"flex",gap:24,position:"relative",zIndex:2}}>
              {["12","04","33"].map((num,i)=>(
                <div key={i} style={{textAlign:"center"}}>
                  <div style={{background:"rgba(255,255,255,0.08)",borderRadius:14,padding:"16px 20px",marginBottom:8}}>
                    <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:40,color:"#fff",letterSpacing:"0.06em"}}>{num}</span>
                  </div>
                  <span style={{fontSize:10,color:"rgba(255,255,255,0.4)",textTransform:"uppercase",letterSpacing:"0.1em"}}>{["Hours","Mins","Secs"][i]}</span>
                </div>
              ))}
            </div>
          </section>

          {/* FOOTER */}
          <footer style={{background:"#111",padding:"52px 48px 32px"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:48,marginBottom:48}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
                  <div style={{width:32,height:32,background:"#e94560",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <span style={{color:"#fff",fontWeight:900,fontSize:14,fontFamily:"'Bebas Neue',sans-serif"}}>T</span>
                  </div>
                  <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,letterSpacing:"0.1em",color:"#fff"}}>TAg</span>
                </div>
                <p style={{fontSize:13,color:"#9ca3af",lineHeight:1.7,maxWidth:280}}>Performance footwear for the relentless. Built for champions, worn by dreamers.</p>
              </div>
              {[["Shop",["Running","Basketball","Lifestyle","Trail","Tennis","Sale"]],
                ["Company",["About Us","Careers","Sustainability","Press"]],
                ["Support",["FAQ","Shipping","Returns","Size Guide"]]
              ].map(([title,links])=>(
                <div key={title}>
                  <h4 style={{margin:"0 0 16px",fontSize:12,fontWeight:800,color:"#fff",letterSpacing:"0.12em",textTransform:"uppercase"}}>{title}</h4>
                  {links.map(l=><p key={l} style={{margin:"0 0 10px",fontSize:13,color:"#6b7280",cursor:"pointer"}}>{l}</p>)}
                </div>
              ))}
            </div>
            <div style={{borderTop:"1px solid #1f2937",paddingTop:28,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
              <p style={{fontSize:12,color:"#4b5563",margin:0}}>© 2026 TAg Sports. All rights reserved.</p>
              <p style={{fontSize:12,color:"#4b5563",margin:0}}>Made with passion for athletes everywhere.</p>
            </div>
          </footer>

          {selectedProduct&&<ProductModal product={selectedProduct} onClose={()=>setSelectedProduct(null)} onAddToCart={addToCart}/>}
          {cartOpen&&<CartDrawer cart={cart} onClose={()=>setCartOpen(false)} onUpdateQty={updateQty} onRemove={removeItem}/>}

          {toast&&(
            <div style={{position:"fixed",bottom:32,right:32,zIndex:2000,background:"#1a1a2e",color:"#fff",
              borderRadius:14,padding:"14px 24px",fontSize:14,fontWeight:600,
              boxShadow:"0 8px 32px rgba(0,0,0,0.2)",animation:"slideIn 0.3s ease",
              display:"flex",alignItems:"center",gap:10}}>
              <span style={{color:"#10b981"}}>✓</span> {toast}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
